<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://kit.fontawesome.com/6282b5e629.js" crossorigin="anonymous"></script>
    <title>Password Generator</title>
</head>
<body>
    <main class="container">
        <h2>Password Generator</h2>

        <div class="password-container">
            <input type="text" readonly id="password" value="">
            <i class="fa-regular fa-copy" id="copy" title="Copiar"></i>
        </div>
        <div class="options-container">
            <div class="options">
                <label for="password-length">Tamanho da Senha</label>
                <input type="range" min="1" max="20" value="10" name="password-length" id="password-length">
                <p id="length-info">10</p>
            </div>
            <div class="options">
                <label for="uppercase">Letras Maiúsculas</label>
                <div class="checkbox-wrapper">
                    <input type="checkbox" name="uppercase" id="uppercase" checked>
                    <span class="checkmark">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path fill="#bfcbd5" d="M434.8 70.1c14.3 10.4 17.5 30.4 7.1 44.7l-256 352c-5.5 7.6-14 12.3-23.4 13.1s-18.5-2.7-25.1-9.3l-128-128c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l101.5 101.5 234-321.7c10.4-14.3 30.4-17.5 44.7-7.1z"/></svg>
                    </span>
                </div>
            </div>
            <div class="options">
                <label for="">Letras Minúsculas</label>
                <div class="checkbox-wrapper">
                    <input type="checkbox" name="lowercase" id="lowercase" checked>
                    <span class="checkmark">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path fill="#bfcbd5" d="M434.8 70.1c14.3 10.4 17.5 30.4 7.1 44.7l-256 352c-5.5 7.6-14 12.3-23.4 13.1s-18.5-2.7-25.1-9.3l-128-128c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l101.5 101.5 234-321.7c10.4-14.3 30.4-17.5 44.7-7.1z"/></svg>
                    </span>
                </div>
            </div>
            <div class="options">
                <label for="number">Números</label>
                <div class="checkbox-wrapper">
                    <input type="checkbox" name="number" id="number" checked>
                    <span class="checkmark">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path fill="#bfcbd5" d="M434.8 70.1c14.3 10.4 17.5 30.4 7.1 44.7l-256 352c-5.5 7.6-14 12.3-23.4 13.1s-18.5-2.7-25.1-9.3l-128-128c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l101.5 101.5 234-321.7c10.4-14.3 30.4-17.5 44.7-7.1z"/></svg>
                    </span>
                </div>
            </div>
            <div class="options">
                <label for="symbols">Caracteres Especiais</label>
                <div class="checkbox-wrapper">
                    <input type="checkbox" name="symbols" id="symbols" checked>
                    <span class="checkmark">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path fill="#bfcbd5" d="M434.8 70.1c14.3 10.4 17.5 30.4 7.1 44.7l-256 352c-5.5 7.6-14 12.3-23.4 13.1s-18.5-2.7-25.1-9.3l-128-128c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l101.5 101.5 234-321.7c10.4-14.3 30.4-17.5 44.7-7.1z"/></svg>
                    </span>
                </div>
            </div>

            <button id="gerate-password"><i class="fa-solid fa-key"></i> Gerar Senha</button>

            <div class="strength-container">
                <p>Segurança da Senha: <span id="strength-label">Média</span></p>

                <div class="strength-meter">
                    <div class="strength-bar"></div>
                </div>
            </div>
        </div>
    </main>



    <script src="scripts/script.js"></script>
</body>
</html>
